<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard — Rhythmia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0c;
            --surface: #111114;
            --border: #1c1c22;
            --border-hover: #2a2a34;
            --text: #a0a0ae;
            --text-dim: #55555f;
            --text-bright: #e4e4ec;
            --accent: #e85d3a;
            --green: #3fca6e;
            --red: #e55555;
            --gold: #f0c040;
            --silver: #b0b0c0;
            --bronze: #cd7f32;
            --radius: 8px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 520px;
            width: 92%;
            padding: 48px 0 40px;
        }

        /* ---- HEADER ---- */
        .header { margin-bottom: 28px; }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
            color: #fff;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            text-decoration: none;
        }

        .logo a {
            text-decoration: none;
            color: var(--text-bright);
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: -0.03em;
        }

        .back-link {
            color: var(--text-dim);
            font-size: 0.72rem;
            text-decoration: none;
            margin-left: 38px;
            transition: color 0.15s;
        }
        .back-link:hover { color: var(--text); }
        .nav-sep { color: var(--border); font-size: 0.68rem; margin: 0 4px; }

        /* ---- SONG META ---- */
        .song-meta {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 16px;
            margin-bottom: 20px;
        }
        .song-name {
            color: var(--text-bright);
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 4px;
            word-break: break-word;
        }
        .song-details {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }
        .song-detail {
            font-size: 0.7rem;
            color: var(--text-dim);
        }
        .song-detail span {
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }
        .song-id-badge {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--accent);
            background: rgba(232, 93, 58, 0.08);
            padding: 2px 7px;
            border-radius: 4px;
        }
        .song-id-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }
        .copy-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-dim);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 2px 7px;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }
        .copy-btn:hover { color: var(--text); border-color: var(--border-hover); }
        .copy-btn.copied { color: var(--green); border-color: var(--green); }

        /* ---- TABLE ---- */
        .lb-section-label {
            color: var(--text-dim);
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 10px;
        }

        .lb-table {
            width: 100%;
            border-collapse: collapse;
        }
        .lb-table th {
            color: var(--text-dim);
            font-size: 0.62rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            text-align: left;
            padding: 0 10px 8px;
            border-bottom: 1px solid var(--border);
        }
        .lb-table th:last-child { text-align: right; }
        .lb-table th.center { text-align: center; }

        .lb-table td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            vertical-align: middle;
        }
        .lb-table tr:last-child td { border-bottom: none; }

        .lb-table tr {
            transition: background 0.12s;
        }
        .lb-table tbody tr:hover {
            background: rgba(255,255,255,0.015);
        }

        .rank-cell {
            width: 36px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.78rem;
            color: var(--text-dim);
        }
        .rank-1 { color: var(--gold); }
        .rank-2 { color: var(--silver); }
        .rank-3 { color: var(--bronze); }

        .player-name {
            color: var(--text-bright);
            font-weight: 600;
            cursor: pointer;
            transition: color 0.15s;
        }
        .player-name:hover { color: var(--accent); }

        .score-cell {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--text-bright);
            text-align: right;
        }

        .acc-cell {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text);
            text-align: center;
        }

        .combo-cell {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: center;
        }

        .fc-badge {
            display: inline-block;
            font-size: 0.58rem;
            font-weight: 700;
            color: var(--green);
            background: rgba(63, 202, 110, 0.1);
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 6px;
            vertical-align: middle;
        }

        /* ---- EMPTY STATE ---- */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-dim);
            font-size: 0.85rem;
        }
        .empty-state .empty-icon {
            font-size: 1.6rem;
            margin-bottom: 10px;
            opacity: 0.3;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ---- LOADING ---- */
        .loading {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        /* ---- ERROR ---- */
        .error-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--red);
            font-size: 0.85rem;
        }

        /* ---- FOOTER ---- */
        .footer {
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            text-align: center;
        }
        .copyright-line {
            color: var(--text-dim);
            font-size: 0.62rem;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.25s ease both; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <a href="/" class="logo-icon">R</a>
                <a href="/"><h1>Rhythmia</h1></a>
            </div>
            <a href="/" class="back-link">&larr; Beat Mapper</a>
            <span class="nav-sep">/</span>
            <a href="/rankings/" class="back-link">Rankings</a>
        </div>

        <div id="content">
            <div class="loading">Loading leaderboard...</div>
        </div>

        <div class="footer">
            <div class="copyright-line">Rhythmia &mdash; any song, any time</div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const songId = params.get('id');
        const API = 'https://appolopl-roblox-rhythm-api.hf.space';
        const content = document.getElementById('content');

        if (!songId) {
            content.innerHTML = '<div class="error-state">No song ID provided<br><span style="font-size:0.72rem;color:var(--text-dim)">Use ?id=your_song_code</span></div>';
        } else {
            load();
        }

        async function load() {
            try {
                const res = await fetch(`${API}/leaderboard/${songId}?limit=50`);
                if (!res.ok) throw new Error('Song not found');
                const data = await res.json();
                render(data);
            } catch (e) {
                content.innerHTML = `<div class="error-state">Could not load leaderboard<br><span style="font-size:0.72rem;color:var(--text-dim)">${e.message}</span></div>`;
            }
        }

        function fmtDuration(sec) {
            if (!sec) return '--';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function fmtScore(n) {
            return n.toLocaleString();
        }

        function render(data) {
            const m = data.meta || {};
            const scores = data.scores || [];

            let html = '<div class="fade-in">';

            // Song meta card
            html += `<div class="song-meta">
                <div class="song-name">${esc(m.filename || data.song_id)}</div>
                <div class="song-details">`;
            if (m.bpm) html += `<div class="song-detail">BPM <span>${Math.round(m.bpm)}</span></div>`;
            if (m.duration) html += `<div class="song-detail">Duration <span>${fmtDuration(m.duration)}</span></div>`;
            if (m.total_notes) html += `<div class="song-detail">Notes <span>${m.total_notes}</span></div>`;
            html += `</div>
                <div class="song-id-row">
                    <div class="song-id-badge">${esc(data.song_id)}</div>
                    <button class="copy-btn" onclick="copyCode('${esc(data.song_id)}', this)">copy code</button>
                </div>
            </div>`;

            // Table or empty state
            if (scores.length === 0) {
                html += `<div class="empty-state">
                    <div class="empty-icon">--</div>
                    No scores yet. Be the first to play this map!
                </div>`;
            } else {
                html += `<div class="lb-section-label">Top scores</div>`;
                html += `<table class="lb-table">
                    <thead><tr>
                        <th class="center">#</th>
                        <th>Player</th>
                        <th class="center">Acc</th>
                        <th class="center">Combo</th>
                        <th style="text-align:right">Score</th>
                    </tr></thead><tbody>`;

                for (const s of scores) {
                    const rankClass = s.rank <= 3 ? ` rank-${s.rank}` : '';
                    html += `<tr>
                        <td class="rank-cell${rankClass}">${s.rank}</td>
                        <td>
                            <span class="player-name" onclick="window.location='/player/?id=${s.user_id}'">${esc(s.username)}</span>
                            ${s.fc ? '<span class="fc-badge">FC</span>' : ''}
                        </td>
                        <td class="acc-cell">${s.accuracy.toFixed(1)}%</td>
                        <td class="combo-cell">${s.max_combo}x</td>
                        <td class="score-cell">${fmtScore(s.score)}</td>
                    </tr>`;
                }

                html += '</tbody></table>';
            }

            html += '</div>';
            content.innerHTML = html;
            document.title = `${esc(m.filename || data.song_id)} — Leaderboard — Rhythmia`;
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        function copyCode(code, btn) {
            navigator.clipboard.writeText(code).then(() => {
                btn.textContent = 'copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'copy code';
                    btn.classList.remove('copied');
                }, 1200);
            });
        }
    </script>
</body>
</html>
